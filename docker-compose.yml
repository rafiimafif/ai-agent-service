version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    container_name: agentflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/data/dev.db
    volumes:
      - prisma-data:/app/prisma/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - BACKEND_URL=http://backend:5000
    container_name: agentflow-frontend
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - BACKEND_URL=http://backend:5000
    depends_on:
      - backend

volumes:
  prisma-data:
